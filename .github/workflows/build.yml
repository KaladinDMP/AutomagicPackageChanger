name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. v1.0.0) - leave empty for build-only, fill in to create a release'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (for bundled JRE)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          java-package: jre

      - name: Install dependencies
        run: npm ci

      - name: Download tools (apktool, uber-apk-signer)
        run: npm run setup-tools

      - name: Bundle portable JRE
        shell: pwsh
        run: |
          # Download Adoptium Temurin JRE 17 for Windows x64
          $jreUrl = "https://api.adoptium.net/v3/binary/latest/17/ga/windows/x64/jre/hotspot/normal/eclipse"
          $zipPath = "$env:TEMP\jre.zip"

          Write-Host "Downloading portable JRE..."
          Invoke-WebRequest -Uri $jreUrl -OutFile $zipPath -UseBasicParsing

          Write-Host "Extracting JRE..."
          $extractPath = "$env:TEMP\jre-extract"
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # The archive extracts to a versioned folder, find it and move contents
          $jreFolder = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          $destPath = "resources\jre"

          if (Test-Path $destPath) { Remove-Item -Recurse -Force $destPath }
          Copy-Item -Path $jreFolder.FullName -Destination $destPath -Recurse

          Write-Host "JRE bundled at $destPath"
          Get-ChildItem "$destPath\bin" | Select-Object -First 5

      - name: Build portable exe
        run: npm run build:portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer
        run: npm run build:installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: AutomagicPackageChanger-Portable
          path: dist/AutomagicPackageChanger-Portable.exe
          if-no-files-found: warn

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AutomagicPackageChanger-Setup
          path: dist/AutomagicPackageChanger*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
