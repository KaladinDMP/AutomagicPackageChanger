appId: com.automagic.packagechanger
productName: AutomagicPackageChanger
directories:
  output: dist
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  icon: icon.png
portable:
  artifactName: AutomagicPackageChanger-v${version}-Portable.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: AutomagicPackageChanger-v${version}-Setup.exe
extraResources:
  - from: resources/tools
    to: tools
    filter:
      - "**/*"
  - from: resources/jre
    to: jre
    filter:
      - "**/*"
